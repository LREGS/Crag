<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Crag Submission</title>
      </head>
      <body>
        <main>
            <h1> Add Crag </h1>
            <form id="addCrag_form">
                <label> Name: <input name="submitted_name" autocomplete="name" /></label>
                <label> Latitude: <input type="number" name="submitted_latitude" step="0.00001" autocomplete="latitude"></label>
                <label> Longitude: <input type="number" name="submitted_longitude" step="0.00001" autocomplete="longitude"></label>
                <button>Submit</button>
            </form>
        </main>
      </body>
</html>2
